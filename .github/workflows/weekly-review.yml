name: weekly-review

on:
#  schedule:
 #   - cron: "0 5 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "bootstrap or incremental"
        required: true
        default: incremental
        type: choice
        options:
          - incremental
          - bootstrap
      review_window_start:
        description: "Optional UTC ISO timestamp override for incremental runs"
        required: false
        type: string

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run review sync
        env:
          WORK_NOTION_TOKEN: ${{ secrets.WORK_NOTION_TOKEN }}
          WORK_NOTION_USER_ID: ${{ secrets.WORK_NOTION_USER_ID }}
          PERSONAL_NOTION_TOKEN: ${{ secrets.PERSONAL_NOTION_TOKEN }}
          PERSONAL_NOTION_INBOX_DATABASE_ID: ${{ secrets.PERSONAL_NOTION_INBOX_DATABASE_ID }}
          PERSONAL_NOTION_PUBLISH_QUEUE_DATABASE_ID: ${{ secrets.PERSONAL_NOTION_PUBLISH_QUEUE_DATABASE_ID }}
          PERSONAL_NOTION_PORTFOLIO_PARENT_ID: ${{ secrets.PERSONAL_NOTION_PORTFOLIO_PARENT_ID }}
          PERSONAL_NOTION_PORTFOLIO_DATABASE_ID: ${{ secrets.PERSONAL_NOTION_PORTFOLIO_DATABASE_ID }}
          PERSONAL_NOTION_TARGET_PAGE_IDS: ${{ secrets.PERSONAL_NOTION_TARGET_PAGE_IDS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REVIEW_WINDOW_START: ${{ inputs.review_window_start }}
          REVIEW_LOOKBACK_DAYS: "8"
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            MODE="incremental"
          fi
          portfolio-ops review sync --mode "$MODE"
